name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/happy-app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: |
          cd ../..
          pnpm install --frozen-lockfile

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          APP_ENV: production

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Sign APK (debug key if no keystore)
        run: |
          cd android
          if [ -z "$ANDROID_KEYSTORE" ]; then
            # Use debug keystore
            APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
            echo "Built with debug key: $APK_PATH"
          else
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
            APK_PATH=$(find app/build/outputs/apk -name "*.apk" | head -1)
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore /tmp/release.keystore \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              "$APK_PATH" "$ANDROID_KEY_ALIAS"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: happy-android-apk
          path: packages/happy-app/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
